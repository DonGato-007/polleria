<h2>📦 Inventario</h2>

<div class="row mb-3">
  <div class="col-md-6">
    <input type="text" id="buscarProducto" class="form-control" placeholder="Buscar producto..." onkeyup="filtrarInventario()">
  </div>
  <div class="col-md-3">
    <select id="filtroStock" class="form-select" onchange="filtrarInventario()">
      <option value="todos">Todos</option>
      <option value="bajo">Stock bajo</option>
      <option value="medio">Stock medio</option>
      <option value="alto">Stock alto</option>
    </select>
  </div>
  <div class="col-md-3">
    <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#modalAgregar">+ Nuevo Producto</button>
  </div>
</div>

<div class="row g-3" id="cardsInventario"></div>

<!-- Modal Agregar -->
<div class="modal fade" id="modalAgregar" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Nuevo Producto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <label>Nombre:</label>
        <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre del producto">
        
        <label>Stock:</label>
        <input type="number" id="stock" class="form-control mb-2" placeholder="Cantidad">
        
        <label>Precio (S/):</label>
        <input type="number" id="precio" class="form-control mb-2" placeholder="Precio">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" onclick="agregarProducto()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Editar -->
<div class="modal fade" id="modalEditar" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Editar Producto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="indexEditar">
        
        <label>Nombre:</label>
        <input type="text" id="nombreEditar" class="form-control mb-2">
        
        <label>Stock:</label>
        <input type="number" id="stockEditar" class="form-control mb-2">
        
        <label>Precio (S/):</label>
        <input type="number" id="precioEditar" class="form-control mb-2">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" onclick="guardarEdicion()">Guardar</button>
      </div>
    </div>
  </div>
</div>
