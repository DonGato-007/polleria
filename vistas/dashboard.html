<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<aside class="admin-main">
    <div class="admin-topbar">
        <div class="d-flex aling-items-center gap-3">
            <h2 class="mb-0 fw-semibold">Dashboard</h2>
        </div>
    </div>
</aside>

<div class="admin-content">
    <div class="row g-3 mb-4">

        <div class="col-3">
            <div class="card stat-cart h-100">
                <div class="card-body d-flex aling-items-center gap-3">
                    <div class="stat-icon bg-opacity-10 text-primary">
                        <i class="bi bi-cart-check"></i>
                    </div>
                    <div class="text-muted small">Ventas del dia</div>
                    <div class="fs-4 fw-semibold ms-auto">$0.00</div>
                </div>
            </div>
        </div>

        <div class="col-3">
            <div class="card stat-cart h-100">
                <div class="card-body d-flex aling-items-center gap-3">
                    <div class="stat-icon bg-opacity-10 text-primary">
                        <i class="bi bi-cart-check"></i>
                    </div>
                    <div class="text-muted small">Gastos del mes</div>
                    <div class="fs-4 fw-semibold ms-auto">$0.00</div>
                </div>
            </div>
        </div>

        <div class="col-3">
            <div class="card stat-cart h-100">
                <div class="card-body d-flex aling-items-center gap-3">
                    <div class="stat-icon bg-opacity-10 text-primary">
                        <i class="bi bi-cart-check"></i>
                    </div>
                    <div class="text-muted small">Saldo de la caja</div>
                    <div class="fs-4 fw-semibold ms-auto">$0.00</div>
                </div>
            </div>
        </div>

        <div class="col-3">
            <div class="card stat-cart h-100">
                <div class="card-body d-flex aling-items-center gap-3">
                    <div class="stat-icon bg-opacity-10 text-primary">
                        <i class="bi bi-cart-check"></i>
                    </div>
                    <div class="text-muted small">Stock bajo</div>
                    <div class="fs-4 fw-semibold ms-auto">0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-6">
            <div class="card border-0 shadow">
                <div class="card-header border-0 py-3 text-white">
                    <div class="mb-0 fw-semibold">Ultimas Ventas</div>
                </div>
            </div>
        </div>
        <div class="col-6">
            <div class="card border-0 shadow">
                <div class="card-header border-0 py-3 text-white">
                    <div class="mb-0 fw-semibold">Más Vendidos</div>
                </div>
            </div>
        </div>
        
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
