<h2>🛒 Punto de Venta</h2>

<div class="row">

  <!-- Productos en Cards -->
  <div class="col-md-8">
    <div class="card p-3">
      <h5>Menú de Productos</h5>
      <div id="productosContainer" class="row g-3"></div>
    </div>
  </div>

  <!-- Carrito / Ticket -->
  <div class="col-md-4">
    <div class="card p-3">
      <h5>🧾 Ticket de Venta</h5>

      <table class="table table-sm table-bordered">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Cant</th>
            <th>Subtotal</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tablaCarrito"></tbody>
      </table>

      <h4>Total: S/ <span id="totalVenta">0</span></h4>

      <button class="btn btn-success w-100" onclick="finalizarVenta()">Finalizar Venta</button>
    </div>
  </div>

</div>

<!-- Modal Cantidad -->
<div class="modal fade" id="modalCantidad" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Agregar Producto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p id="nombreProductoModal"></p>
        <label>Cantidad:</label>
        <input type="number" id="cantidadProducto" class="form-control" value="1" min="1">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" onclick="confirmarAgregar()">Agregar</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Ticket -->
<div class="modal fade" id="modalTicket" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">🧾 Ticket de Venta</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <pre id="contenidoTicket" class=" p-3 rounded"></pre>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-success" data-bs-dismiss="modal" onclick="cerrarVenta()">Aceptar</button>
      </div>
    </div>
  </div>
</div>
